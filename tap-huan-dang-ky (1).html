<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Đăng ký Danh sách tập huấn Nghiệp vụ Kiểm tra, Giám sát năm 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --em:#ef4444;--em2:#f97316;--em3:#facc15;
  --ink:#0f172a;--body:#334155;--muted:#94a3b8;
  --line:#e2e8f0;--bg:#fff7ed;--white:#fff;
  --red:#ef4444;--amber:#f59e0b;
  --r:16px;--r2:22px;
  --ts: cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  font-family:'Plus Jakarta Sans',sans-serif;
  color:var(--ink);font-size:15px;min-height:100vh;
  background-image:
    radial-gradient(at 18% 0%,rgba(239,68,68,.13) 0,transparent 52%),
    radial-gradient(at 82% 100%,rgba(250,204,21,.18) 0,transparent 52%),
    radial-gradient(at 70% 12%,rgba(249,115,22,.10) 0,transparent 45%);
}
button,input,select,textarea{font-family:inherit}

/* ── WRAP ── */
.wrap{max-width:500px;margin:0 auto;padding:16px 14px 110px}

/* ── HEADER BANNER ── */
.banner{
  border-radius:var(--r2);overflow:hidden;margin-bottom:14px;
  background:linear-gradient(135deg,#fff7ed 0%,#ffedd5 44%,#fef3c7 100%);border:1px solid rgba(251,146,60,.25);box-shadow:0 18px 44px rgba(249,115,22,.12);
  padding:26px 22px 22px;position:relative;
}
.banner::before{
  content:"";position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.banner-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.72);border:1px solid rgba(251,146,60,.28);backdrop-filter:blur(14px);
  border-radius:99px;padding:4px 11px 4px 8px;
  font-size:11px;font-weight:800;color:#9f1239;
  letter-spacing:.04em;margin-bottom:10px;
}
.banner-dot{width:7px;height:7px;background:#ef4444;border-radius:50%;animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.banner-title{
  font-size:clamp(19px,4.8vw,24px);font-weight:900;
  color:#7f1d1d;line-height:1.22;margin-bottom:6px;max-width:390px;
}
.banner-sub{font-size:13px;color:#9a3412;font-weight:500}
.banner-logo{
  position:absolute;right:20px;top:50%;transform:translateY(-50%);
  width:52px;height:52px;border-radius:14px;
  background:rgba(255,255,255,.72);border:1px solid rgba(251,146,60,.28);box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
  display:flex;align-items:center;justify-content:center;font-size:24px;
}

/* ── SESSION INFO ── */
.session-strip{
  background:var(--white);border:1px solid var(--line);border-radius:var(--r);
  padding:14px 16px;margin-bottom:14px;
  display:flex;gap:12px;align-items:flex-start;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.session-icon{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#fee2e2,#fed7aa,#fef3c7);
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.session-name{font-size:13.5px;font-weight:800;color:var(--ink);line-height:1.35;margin-bottom:3px}
.session-meta{font-size:12px;color:var(--muted);font-weight:600}

/* ── STEPS ── */
.steps{
  background:var(--white);border:1px solid var(--line);border-radius:var(--r);
  padding:14px 18px;margin-bottom:14px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.steps-track{display:flex;align-items:center;margin-bottom:8px}
.step-node{
  display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;
  cursor:pointer;transition:.15s;
}
.step-node:hover .step-bubble:not(.done){border-color:var(--em)}
.step-bubble{
  width:32px;height:32px;border-radius:50%;
  border:2px solid var(--line);background:var(--white);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:var(--muted);
  transition:all .3s var(--ts);position:relative;
}
.step-bubble.active{
  border-color:var(--em);background:linear-gradient(135deg,#ef4444,#f97316);color:#fff;box-shadow:0 8px 22px rgba(249,115,22,.25);
  box-shadow:0 0 0 5px rgba(5,150,105,.12);
}
.step-bubble.done{border-color:#fb923c;background:#fff7ed;color:#c2410c}
.step-lbl{font-size:10px;font-weight:700;color:var(--muted);white-space:nowrap}
.step-node.active .step-lbl{color:var(--em);font-weight:800}
.step-node.done .step-lbl{color:var(--em)}
.step-conn{flex:1;height:2px;background:var(--line);margin-top:-18px;transition:background .3s}
.step-conn.done{background:var(--em)}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.progress-lbl{font-size:12.5px;font-weight:800;color:var(--ink)}
.progress-num{font-size:11.5px;color:var(--muted);font-weight:700}
.progress-bar{height:4px;background:var(--line);border-radius:99px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f97316,#facc15);border-radius:99px;transition:width .45s var(--ts)}

/* ── CARD ── */
.card{
  background:var(--white);border:1px solid var(--line);border-radius:var(--r2);
  box-shadow:0 2px 8px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  overflow:hidden;
}
.card-accent{height:4px;background:linear-gradient(90deg,#ef4444,#f97316,#facc15)}

/* ── STEP CONTENT ── */
.step-body{padding:22px 20px 20px;animation:slideUp .22s var(--ts) both}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.step-h{font-size:18px;font-weight:900;color:var(--ink);margin-bottom:4px;line-height:1.3}
.step-d{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:20px;line-height:1.5}

/* ── FIELDS ── */
.fields{display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.flabel{font-size:12.5px;font-weight:800;color:var(--body);display:flex;gap:3px;align-items:center}
.req{color:var(--red);font-size:11px}
.inp,.sel,.txta{
  width:100%;border:1.5px solid var(--line);border-radius:var(--r);
  padding:11px 14px;font-size:14.5px;color:var(--ink);
  background:var(--white);outline:none;
  transition:border-color .15s,box-shadow .15s,background .15s;
  -webkit-appearance:none;
}
.sel{
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2.5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 12px center;
  background-size:16px;padding-right:36px;
}
.txta{resize:vertical;min-height:74px;line-height:1.55}
.inp:focus,.sel:focus,.txta:focus{
  border-color:var(--em);background:#fff7ed;
  box-shadow:0 0 0 4px rgba(249,115,22,.13);
}
.inp.err,.sel.err{border-color:var(--red)!important;background:#fff5f5!important}
.ferr{font-size:11.5px;color:var(--red);font-weight:700;display:none;margin-top:2px}
.ferr.show{display:block}

/* ── PARTICIPANT CARDS ── */
.pc-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.pc{
  border:1.5px solid var(--line);border-radius:var(--r);
  overflow:hidden;background:var(--white);
  animation:cardPop .2s var(--ts) both;
  transition:border-color .2s,box-shadow .2s;
}
.pc:focus-within{border-color:rgba(249,115,22,.45);box-shadow:0 0 0 4px rgba(249,115,22,.10)}
@keyframes cardPop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.pc-header{
  padding:10px 12px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,#fff,#fff7ed);
  border-bottom:1px solid var(--line);
}
.pc-left{display:flex;align-items:center;gap:9px}
.avatar{
  width:30px;height:30px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#ef4444,#f97316,#facc15);
  color:#fff;font-size:11.5px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  text-transform:uppercase;letter-spacing:.03em;
}
.pc-name-tag{font-size:13px;font-weight:800;color:var(--ink);
  max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pc-del{
  width:28px;height:28px;border-radius:8px;border:none;
  background:#fee2e2;color:#dc2626;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;flex-shrink:0;
  transition:.15s;
}
.pc-del:hover{background:#fecaca;transform:scale(1.08)}
.pc-body{
  padding:12px 12px 10px;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.pc-body .field:first-child{grid-column:1/-1}
.pc-body .inp,.pc-body .sel{font-size:13.5px;padding:9px 12px}
.pc-body .sel{background-size:14px;padding-right:30px}

.pc-empty{
  border:2px dashed var(--line);border-radius:var(--r);
  padding:26px 16px;text-align:center;
}
.pc-empty-icon{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(135deg,#fee2e2,#fed7aa,#fef3c7);
  margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:22px;
}
.pc-empty-t{font-size:13px;font-weight:700;color:var(--muted);line-height:1.5}

.add-pc-btn{
  width:100%;border:2px dashed var(--line);background:transparent;
  border-radius:var(--r);padding:12px 16px;
  font-size:13.5px;font-weight:800;color:var(--em);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .15s;font-family:inherit;
}
.add-pc-btn:hover{
  border-color:var(--em);background:#fff7ed;
  box-shadow:0 0 0 3px rgba(5,150,105,.08);
}

/* ── REVIEW ── */
.rv-block{border:1.5px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.rv-head{
  padding:9px 14px;
  background:linear-gradient(to right,#f8fafc,#f0fdf4);
  border-bottom:1px solid var(--line);
  font-size:11.5px;font-weight:800;color:var(--em);
  text-transform:uppercase;letter-spacing:.07em;
  display:flex;align-items:center;gap:7px;
}
.rv-body{padding:12px 14px;display:flex;flex-direction:column;gap:9px}
.rv-row{display:flex;gap:8px}
.rv-k{font-size:12px;font-weight:700;color:var(--muted);min-width:88px;flex-shrink:0;padding-top:1px}
.rv-v{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.4;flex:1}
.pchip{
  display:inline-flex;align-items:center;gap:5px;
  background:linear-gradient(to right,#ecfdf5,#eff6ff);
  border:1px solid #a7f3d0;border-radius:99px;
  padding:3px 9px;font-size:12px;font-weight:700;color:#065f46;
  margin:2px 3px 0 0;
}
.rv-check{
  background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;
  padding:10px 13px;font-size:13px;font-weight:700;color:#065f46;
  display:flex;align-items:center;gap:8px;
}

/* ── SUCCESS ── */
.success{padding:28px 20px;text-align:center}
.success-ring{
  width:76px;height:76px;margin:0 auto 18px;border-radius:50%;
  background:linear-gradient(135deg,#059669,#0ea5e9);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 30px rgba(5,150,105,.3);
  animation:ringIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes ringIn{from{opacity:0;transform:scale(.3) rotate(-90deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
.success-h{font-size:22px;font-weight:900;color:var(--ink);margin-bottom:7px}
.success-s{font-size:13.5px;color:var(--muted);font-weight:500;line-height:1.6;margin-bottom:20px}
.code-box{
  display:inline-block;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  border-radius:var(--r);padding:16px 26px;margin-bottom:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}
.code-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.45);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.code-val{font-size:30px;font-weight:900;letter-spacing:.18em;
  background:linear-gradient(90deg,#34d399,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;}
.success-tips{
  background:#f8fafc;border:1px solid var(--line);border-radius:var(--r);
  padding:13px 16px;font-size:12.5px;color:var(--body);font-weight:600;
  text-align:left;line-height:1.7;
}
.success-tips ul{padding-left:18px;margin-top:4px;list-style:none}
.success-tips li::before{content:"✓ ";color:var(--em);font-weight:800}

/* ── ALERTS ── */
.alert{border-radius:12px;padding:11px 14px;font-size:13px;font-weight:700;
  line-height:1.45;margin-top:8px;display:flex;gap:9px;align-items:flex-start}
.a-ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#065f46}
.a-err{background:#fff1f2;border:1px solid #fecdd3;color:#9f1239}
.a-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}

/* ── STICKY FOOTER ── */
.foot{
  position:fixed;bottom:0;left:0;right:0;z-index:99;
  padding:12px 14px 18px;
  background:linear-gradient(to top,var(--bg) 75%,transparent);
}
.foot-inner{
  max-width:500px;margin:0 auto;
  display:grid;grid-template-columns:1fr 2fr;gap:8px;
}
.foot-inner.single{grid-template-columns:1fr}
.btn{
  border:none;border-radius:var(--r);min-height:50px;padding:12px 16px;
  font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .15s,box-shadow .15s,filter .15s;
  letter-spacing:-.01em;
}
.btn:active{transform:scale(.965)}
.btn-ghost{background:var(--white);border:1.5px solid var(--line);color:var(--body)}
.btn-ghost:hover{border-color:var(--em);color:var(--em)}
.btn-main{
  background:linear-gradient(135deg,#ef4444,#f97316,#facc15);
  color:#fff;
  box-shadow:0 12px 28px rgba(249,115,22,.22);
}
.btn-main:hover{filter:brightness(1.06);box-shadow:0 16px 32px rgba(249,115,22,.28)}
.btn-submit{
  background:linear-gradient(135deg,#b91c1c,#ea580c,#f59e0b);
  color:#fff;font-size:16px;
  box-shadow:0 12px 30px rgba(185,28,28,.22);
}
/* Spinner */
.spin{display:inline-block;width:18px;height:18px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;
  animation:rot .6s linear infinite;display:none}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── ADMIN ── */
.admin-box{
  background:var(--white);border:1px solid var(--line);
  border-radius:var(--r2);margin-top:12px;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.admin-toggle{
  width:100%;background:none;border:none;padding:14px 18px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;font-family:inherit;
}
.admin-tl{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:800;color:var(--muted)}
.admin-arr{font-size:11px;color:var(--muted);transition:.2s}
.admin-inner{display:none;border-top:1px solid var(--line)}
.admin-inner.open{display:block}

.stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--line)}
.stat{padding:13px 10px;text-align:center;border-right:1px solid var(--line)}
.stat:last-child{border-right:none}
.stat-n{font-size:24px;font-weight:900;line-height:1;margin-bottom:3px}
.stat-l{font-size:10.5px;font-weight:700;color:var(--muted)}

.regs{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.reg{border:1px solid var(--line);border-radius:var(--r);padding:10px 12px}
.reg-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:4px}
.reg-name{font-size:13px;font-weight:800;color:var(--ink);line-height:1.3}
.badge{font-size:10px;font-weight:800;border-radius:99px;padding:2px 8px;white-space:nowrap;flex-shrink:0}
.bg-ok{background:#fff7ed;color:#c2410c}
.reg-meta{font-size:11.5px;color:var(--muted);font-weight:600}
.reg-cnt{font-size:12px;font-weight:700;color:var(--em);margin-top:4px;display:flex;align-items:center;gap:4px}

/* ── LOADING ── */
.skel{height:52px;border-radius:var(--r);background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200%;animation:sk 1.3s infinite;margin-bottom:8px}
@keyframes sk{0%{background-position:200%}100%{background-position:-200%}}


/* Warm Apple-like light refinements */
.banner,.card,.session-strip,.steps,.admin-box{
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}
.card,.session-strip,.steps{
  box-shadow:0 18px 44px rgba(127,29,29,.07),0 1px 0 rgba(255,255,255,.9) inset;
}
.btn,.step-bubble,.pc,.session-icon,.banner-logo{
  transition:transform .24s cubic-bezier(.22,1,.36,1), box-shadow .24s cubic-bezier(.22,1,.36,1), background .24s cubic-bezier(.22,1,.36,1);
}
.btn:hover,.pc:hover{
  transform:translateY(-2px);
}

/* ── RESPONSIVE ── */
@media(max-width:400px){
  .pc-body{grid-template-columns:1fr}
  .pc-body .field:first-child{grid-column:1}
  .foot-inner{grid-template-columns:1fr}
}
@media(min-width:600px){.wrap{padding-top:24px}}
</style>


</head>
<body>



<div class="wrap">

  <!-- BANNER -->
  <div class="banner">
    <div class="banner-tag">
      <span class="banner-dot"></span>
      Đang mở đăng ký
    </div>
    <div class="banner-title">Đăng ký Danh sách tập huấn<br>Nghiệp vụ Kiểm tra, Giám sát năm 2026</div>
    <div class="banner-sub">Đảng ủy phường Tân Mỹ · UBKT</div>
  </div>

  <!-- SESSION STRIP -->
  <div class="session-strip" id="sessionStrip">
    <div class="session-icon">📚</div>
    <div>
      <div class="session-name" id="sessionName"><div class="skel" style="height:16px;width:240px;margin-bottom:0"></div></div>
      <div class="session-meta" id="sessionMeta"></div>
    </div>
  </div>

  <!-- STEPS HEADER -->
  <div class="steps" id="stepsEl" style="display:none">
    <div class="steps-track" id="track"></div>
    <div class="progress-row">
      <span class="progress-lbl" id="stepLbl"></span>
      <span class="progress-num" id="stepNum"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="card" id="mainCard">
    <div class="card-accent"></div>
    <div class="step-body" id="stepBody">
      <div class="skel"></div><div class="skel" style="height:38px"></div>
      <div class="skel" style="height:60px"></div>
    </div>
  </div>

  <!-- ADMIN -->
  <div class="admin-box" id="adminBox" style="display:none">
    <button class="admin-toggle" onclick="toggleAdmin()">
      <div class="admin-tl">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Tổng hợp đăng ký (UBKT xem)
      </div>
      <span class="admin-arr" id="adminArr">▼</span>
    </button>
    <div class="admin-inner" id="adminInner"></div>
  </div>

  <div id="alertArea"></div>
</div><!-- .wrap -->

<!-- STICKY FOOTER -->
<div class="foot" id="foot" style="display:none">
  <div class="foot-inner" id="footBtns"></div>
</div>

<script>
const SB='https://hbygfheibcrqaqzoaass.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhieWdmaGVpYmNycWFxem9hYXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDg0MTcsImV4cCI6MjA5NDA4NDQxN30.AM-uMmKKuRIPZLtVyV-N0aj5EXuBIrOoyFL-gotb_Qg';
const H={'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY};
const q=(p,o={})=>fetch(`${SB}/rest/v1/${p}`,{headers:H,...o}).then(r=>{if(!r.ok)throw new Error(r.status);return r.json()});

const ROLES=['Bí thư','Phó Bí thư','Ủy viên BCH','Đảng viên chính thức','Đảng viên dự bị','Quần chúng'];
const STEPS=['Chọn cơ sở','Học viên','Xác nhận'];

let step=1,session=null,orgs=[];
var fd={orgId:'',orgName:'',contact:'',phone:'',note:''};
let pArr=[];

const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initials=n=>{const w=(n||'?').trim().split(/\s+/);return w.length>1?w[0][0]+w[w.length-1][0]:w[0].slice(0,2)};
const genCode=()=>(Math.random().toString(36).slice(2,6)+'-'+Date.now().toString(36).slice(-4)).toUpperCase();

function alert2(html,t='ok'){
  const el=document.getElementById('alertArea');
  el.innerHTML=`<div class="alert a-${t}">${html}</div>`;
  setTimeout(()=>el.innerHTML='',5500);
}

// ─── INIT ───
async function init(){
  try{
    const [sessions,rawOrgs]=await Promise.all([
      q('ubkt_training_sessions?is_active=eq.true&order=created_at.desc&limit=1'),
      q('ubkt_base_orgs?select=id,data')
    ]);
    orgs=rawOrgs.map(r=>{
      const d=r.data||{};
      return {
        id:r.id,
        name:d.name||d.orgName||d.title||d.ten||r.id,
        type:d.type||d.orgType||d.group||'Cơ sở Đảng',
        order:Number(d.order??d.sort_order??d.stt??9999)
      };
    }).filter(o=>o.name).sort((a,b)=>a.order-b.order || a.name.localeCompare(b.name,'vi',{numeric:true}));
    if(!sessions.length){
      document.getElementById('sessionName').textContent='Chưa có đợt tập huấn nào đang mở.';
      return;
    }
    session=sessions[0];
    document.getElementById('sessionName').textContent=session.title;
    document.getElementById('sessionMeta').textContent=`Đã tải ${orgs.length}/69 cơ sở Đảng từ hệ thống · Đảng ủy phường Tân Mỹ · UBKT`;
    document.getElementById('stepsEl').style.display='';
    document.getElementById('foot').style.display='';
    document.getElementById('adminBox').style.display='none';
    drawStep();
  }catch(e){
    document.getElementById('sessionName').textContent='Lỗi tải dữ liệu cơ sở Đảng: '+e.message;
  }
}

// ─── STEPPER ───
function drawStep(){
  // Track
  let h='';
  STEPS.forEach((s,i)=>{
    const n=i+1;
    const cls=n<step?'done':n===step?'active':'';
    if(i>0) h+=`<div class="step-conn ${n<=step?'done':''}"></div>`;
    h+=`<div class="step-node ${cls}" onclick="${n<=step?'goStep('+n+')':''}">
      <div class="step-bubble ${cls}">${n<step?'✓':n}</div>
      <div class="step-lbl">${s}</div>
    </div>`;
  });
  document.getElementById('track').innerHTML=h;
  document.getElementById('stepLbl').textContent=`Bước ${step} — ${STEPS[step-1]}`;
  document.getElementById('stepNum').textContent=`${step} / ${STEPS.length}`;
  document.getElementById('progFill').style.width=`${(step/STEPS.length)*100}%`;
  // Footer
  const fi=document.getElementById('footBtns');
  if(step===3){
    fi.className='foot-inner';
    fi.innerHTML=`<button class="btn btn-ghost" onclick="goStep(2)">← Quay lại</button>
      <button class="btn btn-submit" id="btnSub" onclick="submit()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Gửi đăng ký
        <span class="spin" id="subSpin"></span>
      </button>`;
  } else if(step===1){
    fi.className='foot-inner single';
    fi.innerHTML=`<button class="btn btn-main" onclick="nextStep()">Tiếp theo <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>`;
  } else {
    fi.className='foot-inner';
    fi.innerHTML=`<button class="btn btn-ghost" onclick="goStep(step-1)">← Quay lại</button>
      <button class="btn btn-main" onclick="nextStep()">Tiếp theo <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>`;
  }
  // Body
  const body=document.getElementById('stepBody');
  body.style.animation='none'; body.offsetHeight;
  body.style.animation='';
  if(step===1) body.innerHTML=renderS1();
  else if(step===2){body.innerHTML=renderS2(); renderPArr();}
  else body.innerHTML=renderS3();
  window.scrollTo({top:0,behavior:'smooth'});
}

function goStep(n){step=n;drawStep();}
function nextStep(){
  if(step===1){
    if(!fd.orgId){alert2('Vui lòng <b>chọn cơ sở Đảng</b> trước.','err');return;}
    if(!fd.contact.trim()){alert2('Vui lòng nhập <b>họ tên người đăng ký</b>.','err');return;}
  }
  if(step===2){
    if(!pArr.length){alert2('Thêm ít nhất <b>1 học viên</b> trước khi tiếp tục.','err');return;}
    if(pArr.some(p=>!p.name.trim())){alert2('Nhập đầy đủ <b>họ tên</b> cho tất cả học viên.','err');return;}
  }
  if(step<3)goStep(step+1);
}

// ─── STEP 1 ───
function renderS1(){
  const byType={};
  orgs.forEach(o=>{const t=o.type||'Khác';if(!byType[t])byType[t]=[];byType[t].push(o);});
  const order=['Đảng bộ','Chi bộ'];
  const types=[...order.filter(t=>byType[t]),...Object.keys(byType).filter(t=>!order.includes(t))];
  const opts=types.map(t=>`<optgroup label="${esc(t)}">${byType[t].map(o=>`<option value="${esc(o.id)}" ${fd.orgId===o.id?'selected':''}>${esc(o.name)}</option>`).join('')}</optgroup>`).join('');
  return`
    <div class="step-h">Chọn cơ sở Đảng</div>
    <div class="step-d">Chọn đúng cơ sở Đảng và điền thông tin người đăng ký.</div>
    <div class="fields">
      <div class="field">
        <div class="flabel">Cơ sở Đảng <span class="req">*</span></div>
        <select class="sel ${!fd.orgId?'':'ok'}" id="fOrg" onchange="fd.orgId=this.value;fd.orgName=this.options[this.selectedIndex].text;this.classList.remove('err')">
          <option value="">— Chọn cơ sở Đảng —</option>${opts}
        </select>
      </div>
      <div class="field">
        <div class="flabel">Họ tên người đăng ký <span class="req">*</span></div>
        <input class="inp" id="fCon" type="text" placeholder="Bí thư / Phó Bí thư chi bộ"
          value="${esc(fd.contact)}" oninput="fd.contact=this.value">
      </div>
      <div class="field">
        <div class="flabel">Số điện thoại liên hệ</div>
        <input class="inp" type="tel" inputmode="numeric" placeholder="0909 xxx xxx"
          value="${esc(fd.phone)}" oninput="fd.phone=this.value">
      </div>
      <div class="field">
        <div class="flabel">Ghi chú (nếu có)</div>
        <textarea class="txta" rows="2" placeholder="Yêu cầu, đề xuất đặc biệt..."
          oninput="fd.note=this.value">${esc(fd.note)}</textarea>
      </div>
    </div>`;
}

// ─── STEP 2 ───
function renderS2(){
  return`
    <div class="step-h">Danh sách học viên</div>
    <div class="step-d"><b>${esc(fd.orgName)}</b> — Thêm từng người dự kiến tham dự.</div>
    <div id="pcWrap"></div>
    <button class="add-pc-btn" onclick="addP()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Thêm học viên
    </button>`;
}

function renderPArr(){
  const wrap=document.getElementById('pcWrap');
  if(!wrap)return;
  if(!pArr.length){
    wrap.innerHTML=`<div class="pc-empty">
      <div class="pc-empty-icon">👥</div>
      <div class="pc-empty-t">Chưa có học viên nào.<br>Nhấn "+ Thêm học viên" để bắt đầu.</div>
    </div>`;
    return;
  }
  wrap.innerHTML=`<div class="pc-wrap">${pArr.map((p,i)=>`
    <div class="pc" style="animation-delay:${i*35}ms">
      <div class="pc-header">
        <div class="pc-left">
          <div class="avatar">${esc(initials(p.name))}</div>
          <div class="pc-name-tag">${p.name||`Học viên ${i+1}`}</div>
        </div>
        <button class="pc-del" onclick="delP(${i})">×</button>
      </div>
      <div class="pc-body">
        <div class="field">
          <div class="flabel">Họ và tên <span class="req">*</span></div>
          <input class="inp" type="text" placeholder="Nhập đầy đủ họ tên"
            value="${esc(p.name)}"
            oninput="syncP(${i},'name',this.value);
              const a=this.closest('.pc').querySelector('.avatar');
              const t=this.closest('.pc').querySelector('.pc-name-tag');
              if(a)a.textContent=this.value?'${initials(p.name||'?')}':'?';
              if(t)t.textContent=this.value||'Học viên ${i+1}'">
        </div>
        <div class="field">
          <div class="flabel">Chức vụ trong Đảng</div>
          <select class="sel" onchange="syncP(${i},'role',this.value)">
            <option value="">— Chọn —</option>
            ${ROLES.map(r=>`<option ${p.role===r?'selected':''}>${esc(r)}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <div class="flabel">Số điện thoại</div>
          <input class="inp" type="tel" inputmode="numeric"
            placeholder="0909…" value="${esc(p.phone)}"
            oninput="syncP(${i},'phone',this.value)">
        </div>
      </div>
    </div>`).join('')}</div>`;
}

function addP(){
  pArr.push({name:'',role:'',phone:''});
  renderPArr();
  setTimeout(()=>{
    const cards=document.querySelectorAll('.pc');
    const last=cards[cards.length-1];
    if(last){
      last.querySelector('input')?.focus();
      last.scrollIntoView({behavior:'smooth',block:'center'});
    }
  },60);
}
function delP(i){pArr.splice(i,1);renderPArr();}
function syncP(i,f,v){if(pArr[i])pArr[i][f]=v;}

// ─── STEP 3 ───
function renderS3(){
  const chips=pArr.map(p=>`<span class="pchip">👤 ${esc(p.name)}${p.role?' · '+esc(p.role):''}</span>`).join('');
  return`
    <div class="step-h">Xác nhận thông tin</div>
    <div class="step-d">Kiểm tra kỹ thông tin trước khi gửi.</div>
    <div class="rv-block">
      <div class="rv-head">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Thông tin đăng ký
      </div>
      <div class="rv-body">
        <div class="rv-row"><div class="rv-k">Cơ sở Đảng</div><div class="rv-v">${esc(fd.orgName)}</div></div>
        <div class="rv-row"><div class="rv-k">Người đăng ký</div><div class="rv-v">${esc(fd.contact||'—')}</div></div>
        <div class="rv-row"><div class="rv-k">Điện thoại</div><div class="rv-v">${esc(fd.phone||'—')}</div></div>
        ${fd.note?`<div class="rv-row"><div class="rv-k">Ghi chú</div><div class="rv-v">${esc(fd.note)}</div></div>`:''}
      </div>
    </div>
    <div class="rv-block">
      <div class="rv-head">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        ${pArr.length} học viên đăng ký
      </div>
      <div class="rv-body">
        <div class="rv-row"><div class="rv-v">${chips||'—'}</div></div>
      </div>
    </div>
    <div class="rv-block">
      <div class="rv-head">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Đợt tập huấn
      </div>
      <div class="rv-body">
        <div class="rv-row"><div class="rv-k">Tên đợt</div><div class="rv-v" style="color:var(--em)">${esc(session?.title||'')}</div></div>
        <div class="rv-row"><div class="rv-k">Tổ chức</div><div class="rv-v">Đảng ủy phường Tân Mỹ · UBKT</div></div>
      </div>
    </div>
    <div class="rv-check">✅ Sau khi gửi, UBKT sẽ thông báo lịch cụ thể đến từng cơ sở Đảng.</div>`;
}

// ─── SUBMIT ───
async function submit(){
  const btn=document.getElementById('btnSub');
  const spin=document.getElementById('subSpin');
  if(!btn||!spin)return;
  btn.style.opacity='.75';btn.style.pointerEvents='none';
  spin.style.display='inline-block';
  try{
const rr=await fetch(`${SB}/rest/v1/ubkt_training_registrations`,{
      method:'POST',headers:{...H,'Prefer':'return=representation'},
      body:JSON.stringify({session_id:session.id,org_id:fd.orgId,org_name:fd.orgName,
        contact_name:fd.contact,contact_phone:fd.phone,note:fd.note})
    });
    if(!rr.ok)throw new Error('Lỗi lưu đăng ký: '+rr.status);
    const [reg]=await rr.json();
    if(pArr.length){
      const pr=await fetch(`${SB}/rest/v1/ubkt_training_participants`,{
        method:'POST',headers:H,
        body:JSON.stringify(pArr.map(p=>({registration_id:reg.id,full_name:p.name,party_role:p.role,phone:p.phone})))
      });
      if(!pr.ok)throw new Error('Lỗi lưu học viên');
    }
    // Show success
    document.getElementById('track').innerHTML='';
    document.getElementById('stepLbl').textContent='Đăng ký thành công!';
    document.getElementById('stepNum').textContent='';
    document.getElementById('progFill').style.width='100%';
    document.getElementById('foot').style.display='none';
    document.getElementById('stepBody').innerHTML=renderSuccess();
    loadAdmin();
  }catch(e){
    alert2('❌ Gửi thất bại: '+e.message,'err');
    btn.style.opacity='';btn.style.pointerEvents='';
    spin.style.display='none';
  }
}

function renderSuccess(){
  return`<div class="success">
    <div class="success-ring">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-h">Đăng ký thành công!</div>
    <div class="success-s">
      <b>${esc(fd.orgName)}</b> đã đăng ký<br>
      <b>${pArr.length} học viên</b> tham dự tập huấn.
    </div>
    <div class="success-tips">
      <b>Lưu ý:</b>
      <ul>
        <li>UBKT sẽ tổng hợp danh sách và thông báo khi cần.</li>
        <li>Chi bộ có thể lưu lại nội dung đăng ký để đối chiếu.</li>
      </ul>
    </div>
  </div>`;
}

// ─── ADMIN ───
async function loadAdmin(){
  if(!session)return;
  try{
    const regs=await q(`ubkt_training_registrations?session_id=eq.${session.id}&order=submitted_at.desc`);
    const ids=regs.map(r=>r.id);
    const parts=ids.length?await q(`ubkt_training_participants?registration_id=in.(${ids.join(',')})`).catch(()=>[]):[];
    const cmap={};parts.forEach(p=>{cmap[p.registration_id]=(cmap[p.registration_id]||0)+1});
    const done=regs.length,total=orgs.length,left=Math.max(0,total-done),ptotal=parts.length;
    document.getElementById('adminInner').innerHTML=`
      <div class="stats">
        <div class="stat"><div class="stat-n" style="color:var(--em)">${done}</div><div class="stat-l">Đã đăng ký</div></div>
        <div class="stat"><div class="stat-n" style="color:var(--amber)">${left}</div><div class="stat-l">Chưa đăng ký</div></div>
        <div class="stat"><div class="stat-n" style="color:#6366f1">${ptotal}</div><div class="stat-l">Tổng học viên</div></div>
      </div>
      <div class="regs">
        ${regs.length?regs.map(r=>`
          <div class="reg">
            <div class="reg-top">
              <div class="reg-name">${esc(r.org_name)}</div>
              <span class="badge bg-ok">✓ Đăng ký</span>
            </div>
            <div class="reg-meta">👤 ${esc(r.contact_name||'—')} · 📞 ${esc(r.contact_phone||'—')}</div>
            <div class="reg-cnt">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              ${cmap[r.id]||0} học viên
            </div>
          </div>`).join(''):'<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">Chưa có đăng ký nào.</div>'}
      </div>`;
  }catch(e){}
}
function toggleAdmin(){
  const inner=document.getElementById('adminInner');
  const arr=document.getElementById('adminArr');
  const open=inner.classList.toggle('open');
  arr.textContent=open?'▲':'▼';
  if(open)loadAdmin();
}
init();
</script>
</body>
</html>
