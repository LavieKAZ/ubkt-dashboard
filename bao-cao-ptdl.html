<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Báo cáo số liệu KTGS — PTDL · v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>

/* ════════════════════════════════
   DESIGN TOKENS — ubkt-system v1
   ════════════════════════════════ */
:root{
  --pink:#FF0052;--yellow:#FFD400;--green:#00C68D;--blue:#0055DA;
  --r:#FF0052;--o:#0055DA;--y:#FFD400;--g:#00C68D;--b:#0055DA;
  --ink:#111827;--body:#374151;--muted:#8a94a6;
  --line:#e5e7eb;--bg:#f8fafc;--card:#fff;--em:#0055DA;

  --br-50:#ecfdf8;--br-100:#d1faef;--br-600:#00C68D;
  --br-700:#009e72;--br-800:#007f5c;--br-900:#00634a;--br-950:#053b2d;
  --n-0:#fff;--n-50:#f9fafb;--n-100:#f3f4f6;--n-200:#e5e7eb;
  --n-300:#d1d5db;--n-400:#9ca3af;--n-500:#6b7280;--n-600:#4b5563;
  --n-700:#374151;--n-800:#1f2937;--n-900:#111827;
  --c-success:#00C68D;--c-success-bg:#ecfdf8;--c-success-bd:#99f6df;
  --c-warning:#d6a500;--c-warning-bg:#fffbea;--c-warning-bd:#FFE766;
  --c-danger:#FF0052;--c-danger-bg:#fff0f6;--c-danger-bd:#ffb3cb;
  --c-info:#0055DA;--c-info-bg:#eef5ff;--c-info-bd:#b8d2ff;
  --bd:var(--n-200);--bd-strong:var(--n-300);
  --sh-xs:0 1px 2px rgba(0,0,0,.05);
  --sh-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh-md:0 4px 8px rgba(0,85,218,.08),0 2px 4px rgba(0,0,0,.04);
  --ease:cubic-bezier(.25,0,0,1);--spring:cubic-bezier(.34,1.56,.64,1);
  --t-fast:100ms;--t-base:180ms;
  --r-xs:4px;--r-sm:6px;--r-md:8px;--r-lg:12px;--r-xl:16px;--r-2xl:20px;--r-3xl:28px;
}

/* ── OLD VARS ──
:root{
  --r:#ef4444;--o:#f97316;--y:#facc15;--g:#22c55e;--b:#3b82f6;
  --ink:#111827;--body:#374151;--muted:#9ca3af;
  --line:#dbe5f4;--bg:#f8fbff;--card:#fff;
  --em:var(--o);--ease:cubic-bezier(.22,1,.36,1);
}
*/
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  min-height:100vh;font-family:"Be Vietnam Pro",sans-serif;
  color:var(--ink);font-size:15px;
  background:
    radial-gradient(ellipse at 0% 0%,rgba(255,0,82,.10) 0,transparent 40%),
    radial-gradient(ellipse at 100% 0%,rgba(0,85,218,.10) 0,transparent 44%),
    radial-gradient(ellipse at 100% 100%,rgba(0,198,141,.12) 0,transparent 42%),
    linear-gradient(160deg,#fff 0%,#f8fafc 58%,#eef5ff 100%);
}
button,input,select,textarea{font-family:inherit}

/* WRAP */
.app{padding:14px;padding-bottom:100px;min-height:100vh}
.shell{width:min(600px,100%);margin:0 auto;display:flex;flex-direction:column;gap:12px}

/* HERO */
.hero{
  border-radius:24px;overflow:hidden;
  background:
    radial-gradient(circle at 92% 10%,rgba(255,255,255,.22),transparent 28%),
    linear-gradient(135deg,#FF0052 0%,#d90046 100%);
  box-shadow:0 18px 44px rgba(255,0,82,.18), inset 0 1px 0 rgba(255,255,255,.20);
  padding:22px 20px;position:relative;
}
.hero::after{content:"";position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1' fill='%23fff' fill-opacity='.06'/%3E%3C/svg%3E");
}
.hero-inner{position:relative;z-index:1}
.hero-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);backdrop-filter:blur(14px);
  border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.85);letter-spacing:.04em;margin-bottom:10px;
}
.hero-dot{width:6px;height:6px;background:#fff;border-radius:50%;animation:pd 2s infinite}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.4}}
.hero-h{font-size:clamp(18px,5vw,24px);font-weight:900;color:#fff;line-height:1.25;margin-bottom:4px}
.hero-s{font-size:12.5px;color:rgba(255,255,255,.68);font-weight:600}

/* PROGRESS */
.prog-card{
  background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:14px 16px;box-shadow:0 2px 8px rgba(127,29,29,.05);
}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-name{font-size:13.5px;font-weight:900;color:var(--ink)}
.prog-frac{font-size:12px;color:var(--muted);font-weight:700}
.prog-bar{height:5px;background:#eef5ff;border-radius:99px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;background:linear-gradient(90deg,#FF0052,#FFD400,#00C68D,#0055DA);border-radius:99px;transition:width .4s var(--ease)}
.steps-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.steps-row::-webkit-scrollbar{display:none}
.step-pill{
  border:1.5px solid var(--line);background:var(--card);border-radius:99px;
  padding:6px 12px;font-size:11.5px;font-weight:800;white-space:nowrap;
  cursor:pointer;color:var(--muted);transition:.15s;flex-shrink:0;
}
.step-pill.active{background:#0055DA;color:#fff;border-color:#0055DA}
.step-pill.done{background:#E6FAF5;border-color:#00C68D;color:#007A5E}
.step-pill.locked,.step-pill[disabled]{opacity:.4;cursor:not-allowed;pointer-events:none}

/* MAIN CARD */
.main-card{
  background:var(--card);border:1px solid var(--line);border-radius:24px;
  overflow:hidden;box-shadow:0 4px 16px rgba(127,29,29,.06);
}
.card-stripe{height:4px;background:linear-gradient(90deg,#FF0052,#FFD400,#00C68D,#0055DA)}
.card-body{padding:20px 18px 22px;animation:su .22s var(--ease) both}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* STEP HEADER */
.sh{font-size:17px;font-weight:950;margin-bottom:3px}
.sd{font-size:12.5px;color:var(--muted);font-weight:600;line-height:1.5;margin-bottom:18px}

/* FIELDS */
.fields{display:flex;flex-direction:column;gap:12px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.fl{font-size:12px;font-weight:800;color:var(--body);display:flex;gap:3px}
.req{color:var(--r);font-size:11px}
.inp,.sel,.txta{
  width:100%;border:1.5px solid #dbe5f4;border-radius:12px;
  padding:10px 12px;font-size:14px;color:var(--ink);background:#fff;
  outline:none;transition:border var(--t-fast),box-shadow var(--t-fast);
  -webkit-appearance:none;
}
.sel{background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 10px center;
  background-size:15px;padding-right:34px}
.txta{resize:vertical;min-height:72px;line-height:1.5}
.inp:focus,.sel:focus,.txta:focus{border-color:#0055DA;box-shadow:0 0 0 3px rgba(0,85,218,.10)}
.inp.num{font-size:22px;font-weight:900;text-align:center;padding:8px;min-height:52px}
.fhint{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}

/* DIVIDER */
.divider{height:1px;background:linear-gradient(90deg,transparent,#dbe5f4,transparent);margin:16px 0}

/* ─── COUNT SECTION ─── */
.cs{border:1.5px solid #dbe5f4;border-radius:18px;overflow:hidden;margin-top:14px}
.cs-head{
  background:linear-gradient(to right,#f8fbff,#fff);
  padding:12px 14px;border-bottom:1px solid #dbe5f4;
}
.cs-title{font-size:13px;font-weight:800;color:#0055DA}
.cs-ref{font-size:11px;color:var(--muted);font-weight:600;margin-top:1px}

/* STEPPER */
.stepper-wrap{padding:14px;background:#fff;border-bottom:1px solid #eef5ff}
.stepper-label{font-size:12.5px;font-weight:700;color:var(--body);margin-bottom:8px;line-height:1.4}
.stepper{display:flex;align-items:center;gap:0;width:fit-content}
.st-btn{
  width:44px;height:44px;border:2px solid #dbe5f4;background:#fff;
  color:var(--o);font-size:22px;font-weight:900;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;flex-shrink:0;
}
.st-btn:hover{background:var(--br-50);border-color:#0055DA}
.st-btn:active{transform:scale(.93)}
.st-btn.left{border-radius:12px 0 0 12px}
.st-btn.right{border-radius:0 12px 12px 0}
.st-num{
  min-width:64px;height:44px;border-top:2px solid #dbe5f4;border-bottom:2px solid #dbe5f4;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:950;color:var(--o);background:#fffbea;
  letter-spacing:-.02em;transition:color .2s;
}
.st-num.zero{color:var(--n-400)}

/* ZERO STATE */
.zero-state{
  padding:20px 16px;display:flex;align-items:center;gap:11px;
  background:#f0fdf4;
}
.zero-icon{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:#dcfce7;display:flex;align-items:center;justify-content:center;font-size:17px;
}
.zero-text{font-size:12.5px;color:#166534;font-weight:600;line-height:1.5}
.zero-text em{font-style:italic;opacity:.85}

/* DETAIL CARDS */
.detail-cards{padding:10px;display:flex;flex-direction:column;gap:8px}
.dc{
  border:1.5px solid #dbe5f4;border-radius:14px;overflow:hidden;background:#fff;
  animation:dci .2s var(--ease) both;
}
@keyframes dci{from{opacity:0;transform:scale(.97) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.dc-head{
  padding:9px 12px;background:linear-gradient(to right,#f8fbff,#fffbea);
  border-bottom:1px solid #eef5ff;
  display:flex;align-items:center;gap:8px;
}
.dc-num{
  width:26px;height:26px;border-radius:8px;background:var(--o);color:#fff;
  font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.dc-title{font-size:13px;font-weight:800;color:var(--ink)}
.dc-body{padding:12px;display:flex;flex-direction:column;gap:9px}
.dc-body .row2{gap:8px}
.dc-body .inp,.dc-body .sel,.dc-body .txta{font-size:13.5px;padding:8px 11px}

/* REGULAR SUP TABLE */
.sup-table{width:100%;border-collapse:separate;border-spacing:0 6px;padding:10px}
.sup-row{border-radius:12px;overflow:hidden}
.sup-topic-cell{
  background:#f8fbff;border:1px solid #dbe5f4;padding:10px 12px;
  font-size:12.5px;font-weight:800;color:#0055DA;line-height:1.4;
  border-radius:12px 12px 0 0;width:100%;display:block;
  border-bottom:none;
}
.sup-fields{
  background:#fff;border:1px solid #dbe5f4;padding:10px 12px;
  border-radius:0 0 12px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;
}
.sup-block{display:flex;flex-direction:column;gap:4px}
.sup-block-lbl{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}

/* ACTIONS */
.sticky-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  padding:10px 14px 16px;
  background:linear-gradient(to top,#f9fafb 72%,transparent);
}
.ab-inner{max-width:600px;margin:0 auto;display:grid;grid-template-columns:1fr 2fr;gap:8px}
.ab-inner.single{grid-template-columns:1fr}
.btn{
  border:none;border-radius:14px;min-height:50px;padding:11px 16px;
  font-family:inherit;font-size:15px;font-weight:900;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:.15s transform,.15s box-shadow;
}
.btn:active{transform:scale(.965)}
.btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--body)}
.btn-main{
  background:linear-gradient(135deg,#FF0052,#d90046);color:#fff;
  box-shadow:0 8px 22px rgba(255,0,82,.22);
}
.btn-main:hover{box-shadow:0 10px 28px rgba(255,0,82,.30)}
.btn-sub{
  background:linear-gradient(135deg,#0055DA,#003f9f);color:#fff;font-size:16px;
  box-shadow:0 8px 22px rgba(0,85,218,.22);
}
.spin{display:none;width:17px;height:17px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;
  animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ALERTS */
.alert{border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;margin-top:8px;line-height:1.45}
.al-ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.al-err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.al-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}

/* AUTOSAVE */
.autosave-badge{
  position:fixed;bottom:82px;left:16px;z-index:60;
  background:rgba(17,24,39,.8);color:#fff;border-radius:99px;
  padding:5px 12px;font-size:11.5px;font-weight:700;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.autosave-badge.show{opacity:1}


/* Modern interaction tuning */
.shell{scroll-padding-bottom:120px}
.prog-card,.main-card{
  backdrop-filter:blur(18px);
  background:rgba(255,255,255,.86);
  box-shadow:0 18px 46px rgba(17,24,39,.07), inset 0 1px 0 rgba(255,255,255,.82);
}
.steps-row{
  mask-image:linear-gradient(90deg,transparent 0,#000 18px,#000 calc(100% - 18px),transparent 100%);
  -webkit-mask-image:linear-gradient(90deg,transparent 0,#000 18px,#000 calc(100% - 18px),transparent 100%);
  scroll-snap-type:x proximity;
}
.step-pill{scroll-snap-align:start}
.main-card{transition:transform .24s var(--spring),box-shadow .24s var(--ease)}
.main-card:focus-within{transform:translateY(-1px);box-shadow:0 22px 56px rgba(17,24,39,.10)}
.field{transition:transform .18s var(--ease)}
.field:focus-within{transform:translateY(-1px)}
.inp,.sel,.txta{transition:border var(--t-fast),box-shadow var(--t-fast),transform var(--t-fast),background var(--t-fast)}
.inp:focus,.sel:focus,.txta:focus{transform:translateY(-1px)}
.dc,.cs{box-shadow:0 10px 28px rgba(17,24,39,.045)}
.sticky-bar{
  backdrop-filter:blur(18px);
  background:linear-gradient(to top,rgba(248,250,252,.92) 74%,rgba(248,250,252,0));
}
.alert{
  animation:popIn .22s var(--spring) both;
  box-shadow:0 16px 34px rgba(17,24,39,.08);
}
@keyframes popIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@media(min-width:760px){
  .shell{width:min(680px,100%)}
  .hero{padding:26px 24px}
  .hero-h{font-size:26px}
}
@media(max-width:390px){
  .app{padding-left:10px;padding-right:10px}
  .hero{border-radius:20px;padding:18px 16px}
  .hero-h{font-size:18px}
  .prog-card,.main-card{border-radius:18px}
  .btn{min-height:48px;font-size:14px}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}
}


/* Strong motion layer */
.hero{
  animation:heroRise .68s var(--spring) both, heroBreath 5.4s ease-in-out infinite 1s;
  transform-origin:center top;
}
.hero::before{
  content:"";
  position:absolute;
  inset:-45%;
  background:conic-gradient(from 90deg,transparent,rgba(255,255,255,.24),transparent 35%,rgba(255,255,255,.16),transparent 72%);
  animation:heroSweep 6.5s linear infinite;
  pointer-events:none;
}
.hero-inner{animation:heroTextPop .72s var(--spring) both .08s}
.prog-card{animation:cardPop .54s var(--spring) both .12s}
.main-card{animation:cardPop .58s var(--spring) both .18s}
.step-pill{transition:transform .22s var(--spring),background .18s var(--ease),border-color .18s var(--ease),box-shadow .18s var(--ease)}
.step-pill:hover{transform:translateY(-3px) scale(1.035);box-shadow:0 12px 24px rgba(255,0,82,.14)}
.step-pill.active{animation:pulseActive 1.8s ease-in-out infinite}
.btn{transition:transform .18s var(--spring),box-shadow .18s var(--ease),filter .18s var(--ease)}
.btn:hover{transform:translateY(-4px) scale(1.025);filter:saturate(1.08)}
.btn:active{transform:scale(.93)}
.btn-main{animation:primaryBreath 2.4s ease-in-out infinite}
.btn-sub{animation:secondaryBreath 2.6s ease-in-out infinite}
.dc{animation:detailPop .36s var(--spring) both}
.cs{transition:transform .24s var(--spring),box-shadow .24s var(--ease)}
.cs:hover{transform:translateY(-2px);box-shadow:0 18px 40px rgba(17,24,39,.09)}
.st-btn{transition:transform .18s var(--spring),background .18s var(--ease),box-shadow .18s var(--ease)}
.st-btn:hover{transform:scale(1.08);box-shadow:0 10px 20px rgba(0,85,218,.16)}
.inp:focus,.sel:focus,.txta:focus{transform:translateY(-2px) scale(1.006)}
@keyframes heroRise{from{opacity:0;transform:translateY(-18px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes heroBreath{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-2px) scale(1.01)}}
@keyframes heroSweep{to{transform:rotate(360deg)}}
@keyframes heroTextPop{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes cardPop{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes detailPop{from{opacity:0;transform:translateY(14px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes pulseActive{0%,100%{box-shadow:0 0 0 0 rgba(0,85,218,.22)}50%{box-shadow:0 0 0 6px rgba(0,85,218,.08)}}
@keyframes primaryBreath{0%,100%{box-shadow:0 8px 22px rgba(255,0,82,.22)}50%{box-shadow:0 14px 32px rgba(255,0,82,.36)}}
@keyframes secondaryBreath{0%,100%{box-shadow:0 8px 22px rgba(0,85,218,.22)}50%{box-shadow:0 14px 32px rgba(0,85,218,.34)}}

/* PRINT */
.print-area{display:none;padding:20px}
.pc-row{display:flex;gap:10px;justify-content:flex-end;margin-bottom:12px;flex-wrap:wrap}
.print-notice{
  background:#fffbea;border:1px solid #fde68a;color:#111827;
  border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;
  margin-bottom:12px;line-height:1.5;
}
.rdoc{font-family:"Times New Roman",Times,serif;color:#000;font-size:14pt;line-height:18pt}
.rdoc p,.rdoc li{margin:6pt 0}
.rdoc table{width:100%;border-collapse:collapse}
.rdoc th,.rdoc td{border:1px solid #000;padding:4pt 5pt;vertical-align:top;line-height:18pt;word-break:break-word}
.rdoc h1{text-align:center;font-size:14pt;text-transform:uppercase;margin:6pt 0}
.rdoc h2{font-size:14pt;text-transform:uppercase;margin:8pt 0 4pt;page-break-after:avoid}
.rdoc h3{font-size:14pt;margin:6pt 0 3pt;page-break-after:avoid}
.rdoc .center{text-align:center}
.rdoc .htbl td{border:0;padding:0 4pt}
.sig-block{display:grid;grid-template-columns:32% 68%;gap:0;margin-top:16pt;page-break-inside:avoid}
.sig-center{text-align:center;width:100%;min-width:0;max-width:360pt;justify-self:end;padding-left:18pt}
.sig-name{margin-top:70pt;font-weight:normal;border-top:none;padding-top:0;display:block;width:100%;max-width:360pt;white-space:normal;overflow-wrap:anywhere;word-break:normal}
/* Report formatting fixes */
.rdoc .org-line{text-decoration:none;font-weight:normal}
.rdoc .org-line-bold{font-weight:bold}
.rdoc .noi-nhan-lbl{text-decoration:underline;font-weight:normal}
.rdoc .date-line{font-style:italic}
.rdoc .party-title{text-decoration:underline;font-weight:bold}
.rdoc .sig-role{font-weight:normal}
/* Supervision checkbox table */
.sup-tbl{width:100%;border-collapse:separate;border-spacing:0 6px}
.sup-tbl td,.sup-tbl th{vertical-align:top;padding:0}
.sup-tbl th{font-size:10.5px;font-weight:900;text-transform:uppercase;
  letter-spacing:.05em;color:var(--muted);padding:0 6px 6px}
.sup-row-wrap{border:1.5px solid #dbe5f4;border-radius:13px;overflow:hidden}
.sup-row-main{

}

.sup-chk{
  width:22px;height:22px;border-radius:7px;border:2px solid #dbe5f4;

}
.sup-chk.checked{background:var(--o);border-color:var(--o);color:#fff}

.sup-detail{

}

  .sig-block{grid-template-columns:30% 70%!important;gap:0!important}

/* ── PTDL NUMBER ROWS ── */
.num-section{border:1.5px solid var(--c-info-bd);border-radius:18px;overflow:hidden;margin-bottom:14px}
.num-sec-head{background:linear-gradient(to right,var(--c-info-bg),#fff);padding:11px 14px;
  border-bottom:1px solid var(--c-info-bd)}
.num-sec-head.red{background:linear-gradient(to right,var(--c-danger-bg),#fff);border-bottom-color:var(--c-danger-bd)}
.num-sec-head.green{background:linear-gradient(to right,var(--c-success-bg),#fff);border-bottom-color:var(--c-success-bd)}
.num-sec-head.yellow{background:linear-gradient(to right,var(--c-warning-bg),#fff);border-bottom-color:var(--c-warning-bd)}
.num-sec-head.dark{background:linear-gradient(to right,#f3f4f6,#fff);border-bottom-color:var(--n-300)}
.num-sec-letter{display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:8px;font-weight:900;font-size:13px;
  color:#fff;flex-shrink:0;vertical-align:middle;margin-right:8px}
.num-sec-title{font-size:13.5px;font-weight:900;color:var(--ink);display:inline}
.num-sec-ref{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}

/* row for each number */
.num-row{display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding:12px 14px;border-bottom:1px solid var(--n-100);background:#fff}
.num-row:last-child{border-bottom:none}
.num-row-label{font-size:13px;font-weight:700;color:var(--body);flex:1;line-height:1.35}
.num-row-label small{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-top:1px}
.num-stepper{display:flex;align-items:center;flex-shrink:0}
.ns-btn{width:36px;height:36px;border:1.5px solid var(--bd-strong);background:#fff;
  color:var(--o);font-size:18px;font-weight:900;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.12s;flex-shrink:0}
.ns-btn:hover{background:var(--br-50);border-color:#0055DA}
.ns-btn:active{transform:scale(.9)}
.ns-btn.l{border-radius:8px 0 0 8px}
.ns-btn.r{border-radius:0 8px 8px 0}
.ns-num{min-width:52px;height:36px;border-top:1.5px solid var(--bd-strong);
  border-bottom:1.5px solid var(--bd-strong);display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:950;color:var(--o);background:#fffbea;letter-spacing:-.01em;
  transition:color .2s}
.ns-num.zero{color:var(--n-400);background:var(--n-50)}
.ns-num input{width:52px;height:100%;border:none;outline:none;background:transparent;
  text-align:center;font-size:20px;font-weight:950;color:inherit;font-family:inherit}
.ns-num input::-webkit-outer-spin-button,.ns-num input::-webkit-inner-spin-button{-webkit-appearance:none}

/* KQ sub-section */
.kq-band{background:var(--n-50);border-top:1px solid var(--n-100);padding:4px 0}
.kq-label-strip{padding:8px 14px 4px;font-size:11px;font-weight:800;
  color:var(--muted);text-transform:uppercase;letter-spacing:.05em}

/* DB extra box */
.db-extra-wrap{border:2px dashed var(--c-danger-bd);border-radius:20px;
  padding:4px;margin-top:12px;background:rgba(255,0,82,.02)}
.db-extra-title{padding:10px 14px 6px;font-size:11.5px;font-weight:900;
  color:var(--pink);text-transform:uppercase;letter-spacing:.04em;
  display:flex;align-items:center;gap:6px}

/* CONFIRM TABLE */
.ctbl{width:100%;border-collapse:separate;border-spacing:0;
  border:1.5px solid var(--bd);border-radius:16px;overflow:hidden;font-size:12.5px}
.ctbl th{background:var(--n-100);padding:8px 12px;font-weight:800;font-size:11px;
  color:var(--muted);text-align:left;border-bottom:1px solid var(--bd);
  text-transform:uppercase;letter-spacing:.04em}
.ctbl td{padding:8px 12px;border-bottom:1px solid var(--n-100);color:var(--ink);
  vertical-align:middle;line-height:1.45}
.ctbl tr:last-child td{border-bottom:none}
.ctbl td.num{font-weight:900;text-align:right;color:var(--o)}
.ctbl td.num.nz{color:var(--blue)}
.ctbl td.num.alert{color:var(--pink)}
.ctbl-sec td{background:var(--ink);color:#fff;font-weight:800;font-size:12px;
  padding:7px 12px;border-bottom:none}
/* SUCCESS */
.suc-wrap{text-align:center;padding:8px 0}
.suc-icon{font-size:48px;margin-bottom:10px}
.suc-name{font-size:18px;font-weight:950;color:#007A5E;margin-bottom:3px}

<script>

const H   = {'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY};
const sbQ = (p,o={}) => fetch(`${SB}/rest/v1/${p}`,{headers:H,...o}).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();});

function esc(s){var m={'&':'&amp;','<':'&lt;','>':'&gt;'};return String(s??'').replace(/[&<>]/g,function(x){return m[x]||x;});}

  clearTimeout(saveTimer);

// ── DATA ───────────────────────────────────────────────
async function loadData(){
  const cached=JSON.parse(localStorage.getItem('ubkt_orgs_v2')||'null');
  if(cached&&Date.now()-cached.ts<86400000){baseOrgs=cached.data;}
  else{
    try{
      const rows=await sbQ('ubkt_base_orgs?select=id,data&order=data->order.asc');
      baseOrgs=rows.map(r=>({id:r.id,name:r.data?.name||r.id,type:r.data?.type||'',order:Number(r.data?.order??9999)})).sort((a,b)=>a.order-b.order);
      localStorage.setItem('ubkt_orgs_v2',JSON.stringify({ts:Date.now(),data:baseOrgs}));
    }catch(e){console.warn(e);}
  }
  try{
    const ps=await sbQ('ubkt_ktgs_report_periods?status=eq.'+encodeURIComponent('Đang mở')+'&order=opened_at.desc&limit=1');
    if(ps&&ps.length){
      activePeriod=ps[0];
      fd.periodText=ps[0].period_text||'';
      fd.periodId=ps[0].id||'';
      fd.month=ps[0].period_sub?Number(ps[0].period_sub):new Date().getMonth()+1;
      fd.year=ps[0].period_year||new Date().getFullYear();
    }
  }catch(e){console.warn(e);}
  render();
}

// ── STEPPER ────────────────────────────────────────────
function adj(key,delta){
  fd[key]=Math.max(0,(nv(key)+delta));
  const el=document.getElementById('nsn_'+key);
  if(el){
    el.value=fd[key];
    el.parentElement.className='ns-num'+(fd[key]===0?' zero':'');
  }
  saveLocal();
}
function numRow(key,label,hint,color){
  const v=nv(key);
  return `<div class="num-row">
    <div class="num-row-label">${label}${hint?`<small>${hint}</small>`:''}</div>
    <div class="num-stepper">
      <button class="ns-btn l" onclick="adj('${key}',-1)" type="button">−</button>
      <div class="ns-num${v===0?' zero':''}" >
        <input id="nsn_${key}" type="number" min="0" value="${v}" inputmode="numeric"
          oninput="syncFd('${key}',this.value);this.parentElement.className='ns-num'+(Number(this.value)===0?' zero':'')">
      </div>
      <button class="ns-btn r" onclick="adj('${key}',1)" type="button">+</button>
    </div>
  </div>`;
}
function section(color, letter, title, ref, ...fields){
  const themeMap={blue:'',red:' red',green:' green',yellow:' yellow',dark:' dark'};
  const cls = themeMap[color]||'';
  const bgMap={blue:'#0055DA',red:'#FF0052',green:'#00C68D',yellow:'#d6a500',dark:'#374151'};
  const bg = bgMap[color]||'#0055DA';
  return `<div class="num-section">
    <div class="num-sec-head${cls}">
      <span class="num-sec-letter" style="background:${bg}">${letter}</span>
      <span class="num-sec-title">${title}</span>
      ${ref?`<div class="num-sec-ref">${ref}</div>`:''}
    </div>
    ${fields.join('')}
  </div>`;
}
function kqLabel(text){
  return `<div class="kq-label-strip">${text}</div>`;
}

function ensureNhansu(){
  // Đảm bảo mảng nhân sự đủ số lượng
  const cnt = Math.max(1, fd.ns_count||1);
  while(nhansu.length < cnt){
    const i = nhansu.length;
    const chucvu = i===0?'Chủ nhiệm':i===1?'Phó Chủ nhiệm':'Ủy viên';
    nhansu.push({chucvu, hoten:'', dotuoi:'', trinhdo_cm:'', trinhdo_llct:'', ngach_bac:''});
  }
}
function syncNS(i,field,val){
  if(!nhansu[i]) return;
  nhansu[i][field]=val;
  // Sync chức vụ tự động cho 2 người đầu
  if(field==='chucvu' && i<2){
    const el=document.getElementById('nsn_cv_'+i);
    if(el) el.value=val;
  }
  saveLocal();
}
function addNhanSu(){
  fd.ns_count = (fd.ns_count||1)+1;
  const chucvu = nhansu.length===0?'Chủ nhiệm':nhansu.length===1?'Phó Chủ nhiệm':'Ủy viên';
  nhansu.push({chucvu, hoten:'', dotuoi:'', trinhdo_cm:'', trinhdo_llct:'', ngach_bac:''});
  saveLocal();
  renderNoScroll();
}
function removeNhanSu(i){
  if(nhansu.length<=1) return;
  nhansu.splice(i,1);
  fd.ns_count=nhansu.length;
  saveLocal();
  renderNoScroll();
}
function renderNoScroll(){
  const cb=document.getElementById('cardBody');
  if(!cb) return;
  cb.style.animation='none'; cb.offsetHeight; cb.style.animation='';
  cb.innerHTML=(STEP_FNS[step]||renderS1)();
}

function nextStep(){
  if(step===1){
    if(!fd.orgId){showAlert('Vui lòng <b>chọn cơ sở Đảng</b>.'); return;}
    if(!fd.contactName.trim()){showAlert('Vui lòng nhập <b>họ tên người lập báo cáo</b>.'); return;}
    if(!activePeriod){showAlert('Chưa có kỳ báo cáo đang mở. Liên hệ UBKT phường.'); return;}
  }
  const total = TOTAL_STEPS();
  // Validate nhân sự (bước 7 với Đảng bộ)
  if(step===7 && isDB()){
    const cn = nhansu.find(p=>p.chucvu==='Chủ nhiệm');
    if(!cn||!cn.hoten.trim()){
      showAlert('Vui lòng nhập <b>họ tên Chủ nhiệm UBKT</b> ở phụ lục nhân sự.'); return;
    }
  }
  if(step<total){ maxStep=Math.max(maxStep,step+1); goStep(step+1); }
}
function prevStep(){ if(step>1) goStep(step-1); }
function goStep(n){ step=n; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function clearAlert(){ document.getElementById('alertArea').innerHTML=''; }

// ── MAIN RENDER ────────────────────────────────────────
const STEP_FNS=[null,renderS1,renderS2,renderS3,renderS4,renderS5,renderS6,renderNhanSu,renderS7];

function render(){
  document.getElementById('progName').textContent=STEP_LABELS[step-1];
  document.getElementById('progFrac').textContent=step+' / '+TOTAL_STEPS();
  document.getElementById('progFill').style.width=(step/TOTAL_STEPS()*100)+'%';
  document.getElementById('stepsRow').innerHTML=STEP_LABELS.map((s,i)=>{
    const n=i+1;
    // Skip nhân sự step (index 6, bước 7) nếu là chi bộ
    if(!isDB() && i===6) return '';
    // Tính step thực tế khi không phải Đảng bộ (bỏ bước 7)
    const realN = (!isDB() && i===7) ? 7 : n;
    const cur=realN===step, done=realN<step, locked=realN>maxStep;
    return `<button class="step-pill ${cur?'active':done?'done':locked?'locked':''}"
      ${locked?'disabled':''} onclick="${!locked?'goStep('+realN+')':''}">
      ${realN}.${s.split('—')[0].trim()}
    </button>`;
  }).join('');
  const cb=document.getElementById('cardBody');
  cb.style.animation='none'; cb.offsetHeight; cb.style.animation='';
  cb.innerHTML=(STEP_FNS[step]||renderS1)();
  renderNav();
}
function renderNav(){
  const ab=document.getElementById('abInner');
  const confirmStep=STEP_IDX_CONFIRM();
  if(step===confirmStep){
    if(submittedCode){
      ab.className='ab-inner single';
      ab.innerHTML=`<button class="btn btn-ghost" onclick="resetForm()">↩ Báo cáo mới</button>`;
    } else {
      ab.className='ab-inner';
      ab.innerHTML=`<button class="btn btn-ghost" onclick="prevStep()">← Quay lại</button>
        <button class="btn btn-main${fd.confirmed?'':' btn-disabled'}" onclick="submitForm()" id="btnSubmit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
          Gửi báo cáo lên UBKT
          <span class="spin" id="subSpin"></span>
        </button>`;
    }
  } else if(step===1){
    ab.className='ab-inner single';
    ab.innerHTML=`<button class="btn btn-main" onclick="nextStep()">Tiếp theo →</button>`;
  } else {
    ab.className='ab-inner';
    ab.innerHTML=`<button class="btn btn-ghost" onclick="prevStep()">← Quay lại</button>
      <button class="btn btn-main" onclick="nextStep()">Tiếp theo →</button>`;
  }
}

  return Math.random().toString(36).slice(2,6).toUpperCase()+'-'+Date.now().toString(36).slice(-4).toUpperCase();
}

  const btn=document.getElementById('btnSubmit');
  const spin=document.getElementById('subSpin');
  if(btn){btn.style.opacity='.6';btn.style.pointerEvents='none';}
  if(spin) spin.style.display='inline-block';
  try{
    const code=genCode();
    const payload={
      org_id:fd.orgId, org_name:fd.orgName, org_type:fd.orgType,
      month:fd.month||new Date().getMonth()+1, year:fd.year||new Date().getFullYear(),
      period_text:fd.periodText||'', period_id:fd.periodId||null,
      signer_name:fd.contactName, signer_role:fd.contactRole, contact_phone:fd.contactPhone,
      a_tcd_kt:nv('a_tcd_kt'), a_dv_kt:nv('a_dv_kt'), a_kl_tot:nv('a_kl_tot'),
      a_kl_chuatot:nv('a_kl_chuatot'), a_kl_thkl:nv('a_kl_thkl'),
      b_tcd_dhvp:nv('b_tcd_dhvp'), b_dv_dhvp:nv('b_dv_dhvp'), b_kl_chua:nv('b_kl_chua'), b_kl_thkl:nv('b_kl_thkl'),
      c_so_cuoc:nv('c_so_cuoc'), c_so_dv:nv('c_so_dv'), c_kl_tot:nv('c_kl_tot'),
      c_kl_hanche:nv('c_kl_hanche'), c_chuyen_kt:nv('c_chuyen_kt'),
      d_nhacnho:nv('d_nhacnho'),
      e_phan_anh:nv('e_phan_anh'), e_to_cao:nv('e_to_cao'), e_khieu_nai:nv('e_khieu_nai'),
      f_khien_trach:nv('f_khien_trach'), f_canh_cao:nv('f_canh_cao'),
      f_cach_chuc:nv('f_cach_chuc'), f_khai_tru:nv('f_khai_tru'),
      g_so_nd:nv('g_so_nd'), g_hoan_thanh:nv('g_hoan_thanh'),
      h_tc_gq:nv('h_tc_gq'), h_kn_gq:nv('h_kn_gq'), h_kn_doi_hts:nv('h_kn_doi_hts'),
      i_so_cuoc:nv('i_so_cuoc'), i_co_vp:nv('i_co_vp'),
      j_vb_ban_hanh:nv('j_vb_ban_hanh'), j_dv_du_kt:nv('j_dv_du_kt'),
      nhansu:nhansu, nhansu_count:nhansu.length,
      confirm_code:code, submitted_at:new Date().toISOString()
    };
    const res=await fetch(`${SB}/rest/v1/ubkt_ptdl_monthly`,{
      method:'POST', headers:{...H,'Prefer':'return=representation'},
      body:JSON.stringify(payload)
    });
    if(!res.ok) throw new Error(await res.text());
    localStorage.setItem('ptdl_sub_'+fd.orgId+'_'+(fd.periodText||'').replace(/\s/g,'_'), code);
    submittedCode=code; step=7; render();
  }catch(e){
    showAlert('❌ Gửi thất bại: '+e.message);
    if(btn){btn.style.opacity='';btn.style.pointerEvents='';}
    if(spin) spin.style.display='none';
  }
}
function copyCode(){
  if(navigator.clipboard) navigator.clipboard.writeText(submittedCode).then(()=>showAlert('✓ Đã sao chép mã '+submittedCode,'ok'));
}
function resetForm(){
  Object.keys(fd).forEach(k=>{fd[k]=typeof fd[k]==='number'?0:typeof fd[k]==='boolean'?false:'';});
  submittedCode=null; step=1; maxStep=1;
  nhansu=[];
  try{localStorage.removeItem(LS);}catch(e){}
  loadData();
}

          <div class="hero-h">Mã xác nhận: ${esc(code)}</div>
        </div>
      </div>
      <div class="main-card"><div class="card-stripe"></div>
      <div class="card-body" id="vBody" style="text-align:center">Đang tải...</div></div>

  try{
    const rows=await sbQ('ubkt_ptdl_monthly?confirm_code=eq.'+encodeURIComponent(code)+'&limit=1');

        <div><div style="font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-bottom:2px">Kỳ báo cáo</div><div style="font-weight:900;color:var(--blue)">${esc(rr.period_text||'—')}</div></div>
        <div><div style="font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-bottom:2px">Người lập</div><div style="font-weight:800">${esc(rr.signer_name||'—')} · ${esc(rr.signer_role||'—')}</div></div>
        <div><div style="font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-bottom:2px">Gửi lúc</div><div style="font-weight:800;color:var(--c-success)">${new Date(rr.submitted_at).toLocaleString('vi-VN')}</div></div>
      </div>
      <div style="text-align:center;padding:10px 0;font-size:12px;color:var(--muted);font-weight:600;border-top:1px solid var(--bd);margin-top:8px">
        ✅ Báo cáo xác thực · Mã: <b>${esc(code)}</b> · UBKT Đảng ủy phường Tân Mỹ
      </div>`;
  }catch(e){document.getElementById('vBody').innerHTML=`<div class="al-err alert">${e.message}</div>`;}
}

// ── INIT ───────────────────────────────────────────────
(function init(){
  const params=new URLSearchParams(location.search);
  const vc=params.get('verify');
  if(vc){loadVerifyMode(vc);return;}
  const had=loadLocal();
  loadData();
  if(had) setTimeout(()=>showAlert('Đã khôi phục bản nháp. <a href="#" onclick="resetForm();return false" style="color:var(--blue);font-weight:900">Xóa và nhập mới →</a>','info'),400);
})();
</script>
